spring.application.name=sharding-service


spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/sharding}
spring.datasource.username=${DB_USER:sharding}
spring.datasource.password=${DB_PASSWORD:sharding}
spring.datasource.driver-class-name=org.postgresql.Driver


spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=2000
spring.datasource.hikari.max-lifetime=600000


spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true


management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}


anagement.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.slo.http.server.requests=10ms,25ms,50ms,75ms,100ms,200ms,500ms,1s