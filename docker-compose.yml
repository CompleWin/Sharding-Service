services:
  postgres:
    image: postgres:17-alpine
    container_name: sharding-postgres
    environment:
      POSTGRES_DB: sharding
      POSTGRES_USER: sharding
      POSTGRES_PASSWORD: sharding
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sharding -d sharding"]
      interval: 5s
      timeout: 3s
      retries: 10
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=32MB"
      - "-c"
      - "maintenance_work_mem=256MB"
      - "-c"
      - "max_wal_size=2GB"
      - "-c"
      - "checkpoint_timeout=15min"

volumes:
  postgres-data: