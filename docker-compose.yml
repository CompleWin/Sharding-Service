services:
  postgres:
    image: postgres:17-alpine
    container_name: sharding-postgres
    environment:
      POSTGRES_DB: sharding
      POSTGRES_USER: sharding
      POSTGRES_PASSWORD: sharding
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sharding -d sharding"]
      interval: 5s
      timeout: 3s
      retries: 10
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=32MB"
      - "-c"
      - "maintenance_work_mem=256MB"
      - "-c"
      - "max_wal_size=2GB"
      - "-c"
      - "checkpoint_timeout=15min"
  prometheus:
    image: prom/prometheus:latest
    container_name: sharding-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=2h"

  grafana:
    image: grafana/grafana:latest
    container_name: sharding-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

  k6:
    image: grafana/k6:latest
    container_name: sharding-k6
    profiles: [ "load-test" ]
    environment:
      BASE_URL: http://app:8080
    volumes:
      - ./load-tests:/scripts:ro
    command: run /scripts/load-test.js
    depends_on:
      app:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sharding-app
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/sharding
      DB_USER: sharding
      DB_PASSWORD: sharding
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
volumes:
  postgres-data:
  grafana-data:

