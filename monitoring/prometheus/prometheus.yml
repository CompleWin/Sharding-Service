global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'sharding-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'app:8080'
          - 'host.docker.internal:8080'
        labels:
          service: 'sharding-service'